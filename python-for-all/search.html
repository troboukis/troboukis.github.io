<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search · Python for All</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Search · Python for All" />
  <meta property="og:description" content="Search all chapters of Python for All." />
  <meta property="og:image" content="https://troboukis.gr/python-for-all/assets/cover.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://troboukis.gr/python-for-all/assets/cover.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/auth.css" />
  <style>
    .search-wrap {
      padding-top: 48px;
    }

    .search-form {
      display: flex;
      gap: 0;
      border: 1px solid #ccc;
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .search-form:focus-within {
      border-color: #111;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1rem;
      color: #111;
      background: #fff;
    }

    .search-input::placeholder {
      color: #bbb;
      font-style: italic;
    }

    .search-btn {
      background: #111;
      color: #fff;
      border: none;
      padding: 14px 24px;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-btn:hover { background: #333; }

    .search-status {
      margin-top: 28px;
      font-size: 0.88rem;
      color: #999;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .search-results {
      margin-top: 8px;
    }

    .search-result {
      padding: 20px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .search-result:first-child {
      border-top: 1px solid #e0e0e0;
      margin-top: 16px;
    }

    .search-result-meta {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #999;
      margin: 0 0 6px;
    }

    .search-result-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
      letter-spacing: -0.01em;
    }

    .search-result-title:hover {
      border-bottom-color: #111;
    }

    .search-empty {
      padding-top: 48px;
      text-align: center;
      color: #bbb;
      font-style: italic;
      font-size: 1rem;
    }
  </style>
</head>
<body id="top">
  <header id="page-top">
    <p class="kicker">An Introduction to Programming</p>
    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Python for All</a></h1>
    <p class="subtitle">Search All Content</p>
    <p class="byline">Thanasis Troboukis &nbsp;·&nbsp; <a href="index.html" style="color:inherit;">All Chapters</a></p>
  </header>

  <nav data-shared-toc></nav>

  <main>
    <div class="search-wrap">
      <form id="search-form" class="search-form" action="search.html" method="get">
        <input
          id="search-input"
          class="search-input"
          type="search"
          name="q"
          placeholder="Search for a topic, function, or concept…"
          autocomplete="off"
          autofocus
        />
        <button type="submit" class="search-btn">Search</button>
      </form>
      <p id="search-status" class="search-status"></p>
      <div id="search-results" class="search-results"></div>
    </div>
  </main>

  <footer>
    Thanasis Troboukis&nbsp;&nbsp;·&nbsp;&nbsp;Python for All
  </footer>

  <script src="assets/toc.js"></script>
  <script src="assets/lang.js"></script>
  <script type="module" src="assets/auth.js"></script>
  <script>
    let index = null;

    async function loadIndex() {
      if (index) return index;
      const res = await fetch('search-index.json');
      index = await res.json();
      return index;
    }

    function doSearch(query) {
      const q = query.trim().toLowerCase();
      if (!q) return [];
      return index.filter(entry => {
        const haystack = entry.book + ' ' + entry.chapter + ' ' + entry.partLabel + ' ' + entry.partTitle + ' ' + entry.text;
        return haystack.includes(q);
      });
    }

    function renderResults(results, query) {
      const status = document.getElementById('search-status');
      const container = document.getElementById('search-results');
      const q = query.trim();

      if (!q) {
        status.textContent = '';
        container.innerHTML = '';
        return;
      }

      if (results.length === 0) {
        status.textContent = `No results for "${q}"`;
        container.innerHTML = '<p class="search-empty">Try a different keyword or browse the table of contents.</p>';
        return;
      }

      status.textContent = `${results.length} result${results.length === 1 ? '' : 's'} for "${q}"`;
      container.innerHTML = results.map(r => `
        <article class="search-result">
          <p class="search-result-meta">${r.book} &nbsp;·&nbsp; ${r.chapter}</p>
          <a class="search-result-title" href="${r.url}">${r.partLabel} — ${r.partTitle}</a>
        </article>
      `).join('');
    }

    async function runSearch(query) {
      await loadIndex();
      const results = doSearch(query);
      renderResults(results, query);
    }

    const params = new URLSearchParams(location.search);
    const initialQuery = params.get('q') || '';
    const input = document.getElementById('search-input');
    input.value = initialQuery;
    if (initialQuery) runSearch(initialQuery);

    let debounceTimer;
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => runSearch(input.value), 200);
    });

    document.getElementById('search-form').addEventListener('submit', e => {
      e.preventDefault();
      const q = input.value.trim();
      if (q) history.replaceState(null, '', '?q=' + encodeURIComponent(q));
      runSearch(input.value);
    });
  </script>
</body>
</html>
